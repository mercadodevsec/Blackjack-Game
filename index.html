<!DOCTYPE html>
<html>

<head>
    <link rel='stylesheet' href='index.css'>
</head>

<body>
    <h1>
        Blackjack
    </h1>
    <p id='message-el'>Want to play a round?</p>
    <p id='player-cards-el'>Your cards:</p>
    <p id='dealer-cards-el'>Dealer's cards:</p>
    <p class='player-sum-el'>Your sum:</p>
    <p class='dealer-sum-el'>Dealer's sum:</p>
    <div id="playermenu-container">
        <button id='startgame-el' onclick='startGame()'>START GAME</button>
    </div>
    <div id="playermove-container">
        <button onclick='player.hit()' >HIT</button>
        <button onclick='player.stand()' >STAND</button>
        <button onclick='player.double()' >DOUBLE</button>
        <button onclick='player.split()' >SPLIT</button>
    </div>
    <p>Enter the amount of chips: $<input id="inputchips-el" type="number" min="0"></p>
    <p>Your bet: $<input id="inputbet-el" type="number" min="0"></p>
    <h3 id='player-el'></h3>
    <script src='index.js'></script>
</body>

</html>
